<!doctype html>
<html lang="en" ng-app="legacyAdmin">
  <head>
    <meta charset="UTF-8" />
    <title>Legacy admin</title>
    <script type="module" crossorigin src="/legacy/assets/admin-CB1EBwjN.js"></script>
    <link rel="modulepreload" crossorigin href="/legacy/assets/legacy-B7Lb4hym.js">
    <link rel="stylesheet" crossorigin href="/legacy/assets/legacy-KK0G-0FC.css">
  </head>
  <body>
    <div ng-controller="AdminCtrl as vm" class="container">
      <h1>Organization settings</h1>
      <p class="sub">AngularJS 1.x with mock react2angular bridge. Digest-driven updates.</p>

      <div class="card">
        <h3>Workspace</h3>
        <label>Workspace name</label>
        <input type="text" ng-model="vm.name" />

        <label>Default region</label>
        <select ng-model="vm.region">
          <option value="us">US</option>
          <option value="eu">EU</option>
          <option value="apac">APAC</option>
        </select>

        <label><input type="checkbox" ng-model="vm.sso" /> Enforce SSO</label>
        <label><input type="checkbox" ng-model="vm.audit" /> Audit log export</label>

        <div class="actions">
          <button ng-click="vm.save()" ng-disabled="!vm.dirty()">
            {{ vm.saving ? 'Saving...' : 'Save' }}
          </button>
          <span class="status" ng-if="vm.savedAt">Saved at {{ vm.savedAt }}</span>
        </div>
      </div>

      <div class="card">
        <h3>React-bridged summary</h3>
        <div class="r2a-host" id="r2a-summary"></div>
      </div>

      <div class="card">
        <h3>Recent changes</h3>
        <ul>
          <li ng-repeat="row in vm.log track by $index">{{ row }}</li>
        </ul>
      </div>
    </div>

  </body>
</html>

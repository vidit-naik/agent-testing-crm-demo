# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs24

env:
  # SQLite (local development - not needed in production)
  - variable: SQLITE_URL
    value: "file:./dev.db"

  # PostgreSQL (Supabase) - stored as secrets in Google Cloud Secret Manager
  - variable: POSTGRES_URL
    secret: postgres-url

  - variable: POSTGRES_DIRECT_URL
    secret: postgres-direct-url
